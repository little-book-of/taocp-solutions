website:
  title: *book_title
  page-navigation: true
  navbar:
    search: true
    right:
      - text: English
        href: /
      - text: 中文
        href: /taocp-solutions/zh/
      - text: *book_subtitle 
      - icon: github
        href: https://github.com/little-book-of/taocp-solutions
        aria-label: GitHub

format:
  html:
    sidebar: true
    toc: true
    toc-location: left
    toc-depth: 3
    number-sections: false
    theme: [cosmo, brand]
  epub:
    title: *book_title
    subtitle: *book_subtitle
    author: *book_author
    date: *book_date
    toc: true 
    toc-depth: 3
    number-sections: false
  pdf:
    title: *book_title
    subtitle: *book_subtitle
    author: *book_author
    date: *book_date
    toc: true 
    toc-depth: 3
    number-sections: false
    colorlinks: true
  latex:
    number-sections: false
