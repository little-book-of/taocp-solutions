  subtitle: &book_subtitle "Version 0.1.0"
  author: &book_author "Duc-Tam Nguyen"
  date: &book_date "2025-09-13"
  output-file: book
  chapters:
    - index.qmd
    - vol-1/1.1.md
    - vol-1/1.2.1.md
    - vol-1/1.2.2.md
    - vol-1/1.2.3.md
    - vol-1/1.2.4.md
    - vol-1/1.2.5.md
    - vol-1/1.2.6.md
    - vol-1/1.2.7.md
    - vol-1/1.2.8.md
    - vol-1/1.2.9.md
    - vol-1/1.2.10.md
    - vol-1/1.2.11.md
    - vol-1/1.3.1.md
    - vol-1/1.3.2.md
    - vol-1/1.3.3.md
    - vol-1/1.4.1.md
    - vol-1/1.4.2.md
    - vol-1/1.4.3.1.md
    - vol-1/1.4.3.2.md
    - vol-1/1.4.4.md
    - vol-1/2.1.md
    - vol-1/2.2.1.md
